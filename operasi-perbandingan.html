<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasi-Perbandingan</title>
</head>
<body>
    <script>
        let result = 5 == "5";
        document.writeln(result);
        document.writeln("</br>");

        result = 5 === "5";
        document.writeln(result);
        document.writeln("</br>");

        result = 5 > 10;
        document.writeln(result);
        document.writeln("</br>");

        result = 5 < 10;
        document.writeln(result);

        result = 5 >= 5;
        document.writeln("</br>");
        document.writeln(result);

        result = 5 <= 2;
        document.writeln("</br>");
        document.writeln(result);

        result = 5 != 10;
        document.writeln("</br>");
        document.writeln(result);

        result = 5 !== "5";
        document.writeln("</br>");
        document.writeln(result);

        result = 5 === 3;
        document.writeln("</br>");
        document.writeln(result);

        
    </script>
</body>
</html>
