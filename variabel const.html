<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variabel const</title>
</head>
<body>
    <script>
        const fullName = "Dwi" + " " + "Tegar" + " " + "Nugraha";
        const age = 20;
        const address = "Jl. Raya Cibaduyut No. 123, Purwokerto";
        const isMarried = false;

        document.writeln("fullName: " + fullName);
        document.writeln("</br>");
        document.writeln("age: " + age);
        document.writeln("</br>");
        document.writeln("address: " + address);
        document.writeln("</br>");
        document.writeln("isMarried: " + isMarried);


        
    </script>
</body>
</html>
