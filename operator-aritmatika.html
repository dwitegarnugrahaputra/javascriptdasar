        let result1 = 10 + 5; // Penjumlahan
        document.writeln("<p>10 + 5 = " + result1 + "</p>");
        let result2 = 10 - 3; // Pengurangan
        document.writeln("<p>10 - 3 = " + result2 + "</p>");
        let result3 = 4 * 2; // Perkalian
        document.writeln("<p>4 * 2 = " + result3 + "</p>");
        let result4 = 20 / 4; // Pembagian
        document.writeln("<p>20 / 4 = " + result4 + "</p>");

        let result = 1 - 11;
        document.writeln("<p>1 - 11 = " + result + "</p>");
        let originalResult = result;

        result = result * 2;
        document.writeln("<p>" + originalResult + " * 2 = " + result + "</p>");
    </script>
